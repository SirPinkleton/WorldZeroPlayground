name: Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: worldzero
          POSTGRES_PASSWORD: test
          POSTGRES_DB: worldzero_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://worldzero:test@localhost/worldzero_test
      TEST_DATABASE_URL: postgresql+asyncpg://worldzero:test@localhost/worldzero_test
      SECRET_KEY: ci-test-secret-key-not-for-production
      GOOGLE_CLIENT_ID: dummy-client-id
      GOOGLE_CLIENT_SECRET: dummy-client-secret
      GOOGLE_REDIRECT_URI: http://localhost:8000/auth/google/callback
      MEDIA_BASE_URL: http://localhost:8000/media
      MEDIA_ROOT: /tmp/media

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run migrations
        run: python -m alembic upgrade head
        working-directory: backend

      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=58
        working-directory: backend
