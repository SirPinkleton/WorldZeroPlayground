services:
  - type: web
    name: worldzero-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    branch: main
    autoDeploy: true
    port: 8000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: worldzero-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://api.worldzero.org/auth/google/callback
      - key: MEDIA_BASE_URL
        value: https://api.worldzero.org/media
      - key: FRONTEND_URL
        value: https://worldzero.org
      - key: CORS_ORIGINS
        value: https://worldzero.org,https://www.worldzero.org
      - key: ENVIRONMENT
        value: production
      - key: COOKIE_DOMAIN
        value: .worldzero.org

  - type: web
    name: worldzero-frontend
    runtime: static
    rootDir: frontend
    branch: main
    autoDeploy: true
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://api.worldzero.org
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: worldzero-db
    databaseName: worldzero
    user: worldzero
    plan: free
